name: New guide
description: Scaffold a new travel guide (structure + live weather/holiday/currency; facts added later by a research pass).
title: "New guide: "
labels: ["new-guide"]
body:
  - type: markdown
    attributes:
      value: |
        This files a **draft scaffold** — the standard guide structure with live weather,
        holidays, and currency wired in for your country. It commits straight to the
        Guides-to-be draft tier; a research pass then fills the facts. Nothing here is
        verified until that happens. The **Country** field is the only required one —
        fill in as much or as little else as you know now and add more later.
  - type: input
    id: country
    attributes:
      label: Country
      description: Used to theme the guide and pull its currency and holidays. Time zone and map location are resolved separately, from the destination's actual coordinates during research — not from country.
      placeholder: e.g. Brazil
    validations:
      required: true
  - type: input
    id: cities
    attributes:
      label: City / cities
      placeholder: e.g. Rio de Janeiro, São Paulo
    validations:
      required: false
  - type: input
    id: dates
    attributes:
      label: Trip dates
      description: Optional. Format "YYYY-MM-DD to YYYY-MM-DD" — drives the day-by-day cards and the weather/holiday window.
      placeholder: 2026-03-01 to 2026-03-08
    validations:
      required: false
  - type: input
    id: anchor
    attributes:
      label: Anchor event
      description: >-
        The one non-negotiable the trip is built around (a concert, a match, a festival, a
        wedding). This is the most perishable, most important fact on the trip — the research
        pass verifies its date + venue against an official source FIRST. Include a source URL
        if you have one.
      placeholder: e.g. Pokémon GO Wild Area — Mexico City, Nov 6–8 2026 (pokemongolive.com)
    validations:
      required: false
  - type: input
    id: travelers
    attributes:
      label: Number of travelers
      description: Just the headcount. Anything more specific (solo/couple/family, ages, mobility needs) goes in Comments below.
      placeholder: e.g. 3
    validations:
      required: false
  - type: input
    id: party
    attributes:
      label: Who's this for / party
      description: >-
        Who is actually going — the more concrete the better. This maps the guide onto how these
        specific travelers move (pace, walking tolerance, whether the group splits). Name a prior
        trip if the same people traveled before ("the Korea group"), or describe them.
      placeholder: e.g. the Korea group (3 mid-20s, gaming anchors, heavy walkers) / family of 5 with grandparents
    validations:
      required: false
  - type: dropdown
    id: pace
    attributes:
      label: Pace
      description: How packed should the days be?
      options:
        - undecided
        - packed
        - balanced
        - slow
      default: 0
    validations:
      required: false
  - type: dropdown
    id: travel-style
    attributes:
      label: Travel style
      description: >-
        How far off the tourist trail? Drives how hard the research leans on crowd-avoidance and
        non-obvious local picks versus the marquee must-sees.
      options:
        - undecided
        - Bucket-list must-sees
        - Off-the-beaten-path
        - Balanced
      default: 0
    validations:
      required: false
  - type: dropdown
    id: priority1
    attributes:
      label: "Priority #1 (most important)"
      description: Three separate rank fields, not a multi-select — so the order you actually mean is preserved.
      options:
        - "— none —"
        - Food & dining
        - Culture / history
        - Nature / outdoors
        - Nightlife
        - Shopping
        - Wellness / relaxation
        - Niche interest (specify below)
      default: 0
    validations:
      required: false
  - type: dropdown
    id: priority2
    attributes:
      label: "Priority #2"
      options:
        - "— none —"
        - Food & dining
        - Culture / history
        - Nature / outdoors
        - Nightlife
        - Shopping
        - Wellness / relaxation
        - Niche interest (specify below)
      default: 0
    validations:
      required: false
  - type: dropdown
    id: priority3
    attributes:
      label: "Priority #3"
      options:
        - "— none —"
        - Food & dining
        - Culture / history
        - Nature / outdoors
        - Nightlife
        - Shopping
        - Wellness / relaxation
        - Niche interest (specify below)
      default: 0
    validations:
      required: false
  - type: input
    id: niche
    attributes:
      label: Niche interest
      description: Only fill in if you picked "Niche interest" above (e.g. anime, esports, diving, architecture, live music).
      placeholder: e.g. live music
    validations:
      required: false
  - type: dropdown
    id: budget
    attributes:
      label: Budget
      description: Per-day spending target, all-in (lodging + food + activities).
      options:
        - undecided
        - "Shoestring (<$75/day)"
        - "Mid-range ($75–150/day)"
        - "Comfortable ($150–300/day)"
        - "Luxury ($300+/day)"
      default: 0
    validations:
      required: false
  - type: textarea
    id: comments
    attributes:
      label: Comments
      description: Anything the fields above don't capture — group makeup, dietary needs, a fixed anchor event, dealbreakers, etc.
      placeholder: e.g. traveling with my parents, one vegetarian, celebrating an anniversary
    validations:
      required: false
