name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      # Refresh public-holiday data (Nager.Date) before building. The script is
      # self-healing: on any fetch error it keeps the committed JSON, so the build
      # always proceeds with last-good data.
      - run: node scripts/fetch-holidays.mjs
      # Google Maps browser key (optional). When the repo secret exists, guides
      # build with the Google Maps provider; when absent, the keyless
      # OpenStreetMap iframe embedded in each map section stands as the map
      # (src/features/maps/ never boots). The key is a PUBLIC browser key —
      # restrict it by HTTP referrer + API in Google Cloud Console; the secret
      # only keeps it out of the repo.
      - run: npm run build
        env:
          PUBLIC_GMAPS_KEY: ${{ secrets.PUBLIC_GMAPS_KEY }}
          PUBLIC_GMAPS_MAP_ID: ${{ secrets.PUBLIC_GMAPS_MAP_ID }}
      # Performance budget — fail the deploy if bundles bloat past budget.
      - run: node scripts/check-perf-budget.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # deploy-pages intermittently fails with "Deployment failed, try again
      # later" (Pages-side transient; observed repeatedly on this repo).
      # Retry twice with a pause before failing for real.
      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - uses: actions/deploy-pages@v4
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
      - name: Wait before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: sleep 90
      - uses: actions/deploy-pages@v4
        id: deployment-final
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
