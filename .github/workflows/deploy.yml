name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      # P5: gate the deploy on typecheck too — previously only test.yml (a parallel, non-required
      # check) ran it, so the pipeline could push straight to a main deploy regardless of
      # typecheck's result.
      - run: npm run typecheck
      # Refresh public-holiday data (Nager.Date) before building. The script is
      # self-healing: on any fetch error it keeps the committed JSON, so the build
      # always proceeds with last-good data.
      - run: node scripts/fetch-holidays.mjs
      # Google Maps browser key (optional). When the repo secret exists, guides
      # build with the Google Maps provider; when absent, the keyless
      # OpenStreetMap iframe embedded in each map section stands as the map
      # (src/features/maps/ never boots). The key is a PUBLIC browser key —
      # restrict it by HTTP referrer + API in Google Cloud Console; the secret
      # only keeps it out of the repo.
      - run: npm run build
        env:
          PUBLIC_GMAPS_KEY: ${{ secrets.PUBLIC_GMAPS_KEY }}
          PUBLIC_GMAPS_MAP_ID: ${{ secrets.PUBLIC_GMAPS_MAP_ID }}
      # Performance budget — fail the deploy if bundles bloat past budget.
      - run: node scripts/check-perf-budget.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # deploy-pages intermittently fails with "Deployment failed, try again
      # later" (Pages-side transient; observed repeatedly on this repo).
      # Retry twice with a pause before failing for real.
      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - uses: actions/deploy-pages@v4
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
      - name: Wait before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: sleep 90
      - uses: actions/deploy-pages@v4
        id: deployment-final
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'

  # "Did it actually land?" — the check whose absence let a finished guide sit invisible
  # for a day (every internal gate was green; nobody confirmed the live page). This runs
  # AFTER deploy against the real production URL: it fetches each guide the repo says is
  # published and confirms it's both reachable and linked from the homepage. verify-live.mjs
  # retries internally for CDN propagation lag, so a transient miss self-heals; a persistent
  # one turns this run red AND files an issue, so a missing guide can never go unnoticed again.
  verify-live:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # No npm ci needed — verify-live.mjs uses only Node built-ins + global fetch.
      - id: check
        run: node scripts/verify-live.mjs
      # On a real, sustained failure: open (or update) a single tracking issue so it's
      # impossible to miss. The red X above is the primary signal; this is the paper trail.
      - name: File a live-site mismatch issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🚨 Live site does not match what the repo says is published";
            const body = [
              "`verify-live` failed after a deploy: a guide is marked published in the repo but is not",
              "actually reachable and linked on the live site.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Reproduce locally: `npm run verify-live`",
            ].join("\n");
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "deploy-verification",
            });
            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["deploy-verification"],
              });
            }
