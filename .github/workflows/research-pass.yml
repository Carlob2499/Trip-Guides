name: Research pass

# Assisted research pass: a Claude Code agent researches one guide via the TWO-PASS procedure
# (Pass A canonical/verified → Pass B local/authentic/crowd-aware → reconcile), runs the
# self-correction loop until it passes the readiness gate, commits to a branch, and opens a draft
# PR for human review. Never auto-merges; draft: true is always preserved. Trigger via
# workflow_dispatch. A full dual pass is long — see the wall-clock note in the prompt.
#
# Runs on your Claude MAX subscription (not a pay-per-use API key), so a headless run costs ~$0
# marginal against your plan. Prerequisites:
#   - CLAUDE_CODE_OAUTH_TOKEN secret set in repo Settings → Secrets → Actions.
#     Generate it once locally with `claude setup-token` (Pro/Max only) and paste the value.
#   - The guide's scaffold exists at src/content/guides/<slug>.json
#
# Usage: Actions → Research pass → Run workflow → enter slug (and optionally section)
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Guide slug (e.g. japan, sweden). Must match src/content/guides/<slug>.json"
        required: true
        type: string
      section:
        description: "Section key to focus on (e.g. food, sights). Leave blank for a full pass."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name  "waypoint-research[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run research agent
        uses: anthropic/claude-code-action@v1
        with:
          # Auth via the Claude Max subscription (claude setup-token), not a paid API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
          prompt: |
            Guide slug: ${{ inputs.slug }}
            Section focus: ${{ inputs.section || 'full pass — all sections' }}

            Use the waypoint-guide-author skill: read .claude/skills/waypoint-guide-author/SKILL.md
            and its references/ (verification-rules.md, block-types.md) and follow them exactly —
            the source-tier ladder, the verification ledger, the ≈/⚠ fact states, the deterministic
            lookup scripts, the done gate, and the completion report. The CLAUDE.md accuracy standard
            (auto-loaded) is also binding.

            Target guide: src/content/guides/${{ inputs.slug }}.json
            ${{ inputs.section != '' && format('Scope this pass to the "{0}" section only; leave all other sections as-is.', inputs.section) || '' }}

            RESEARCH IS TWO PASSES, THEN RECONCILE — this is the core of the skill's Research
            workflow; do NOT collapse it into a single pass:
              PASS A — canonical & verified: primary/official sources. Verify the ANCHOR event's
                date + venue against a T0 source FIRST, then the must-dos, entry/visa, transit,
                hours, prices. Keep the verification ledger as you go.
              PASS B — local, authentic, crowd-aware: research INDEPENDENTLY from the intake (do
                not just re-read Pass A). Resident / blog / forum / reddit angle — off-peak timing
                + crowd reality for every marquee sight, novel local alternatives where the obvious
                pick is a tourist trap, the non-obvious neighborhood. Pass B's finds are T2 LEADS:
                verify each against a primary source before it enters the guide.
              RECONCILE into ONE guide and record it in the `## Research reconciliation` ledger of
                guides-intake/${{ inputs.slug }}.md — AGREE → include; A-only → add a crowd +
                best-time note, or swap to B's authentic version if A is a trap; B-only → verify T0
                then include; CONFLICT → resolve to the truth, note which source won. Log any
                research-forced re-plan in that doc's `## Amendments` section. Every marquee
                sight/food rec carries a crowd + best-time note, woven into the existing
                sights/days bodies (no new sections, no tab-budget cost).

            NOTE — a full dual pass is long and may approach the Action wall-clock / usage limit.
            If so: take Pass A to a clean readiness PASS first, then run Pass B for the anchor + the
            top-2 priorities, and state in the PR body which items still await Pass B. The
            interactive Max session (see new-guide.yml's kickoff comment) is the fallback for
            finishing the rest.

            SELF-CORRECTION LOOP — do not one-shot this. After the dual-pass draft is reconciled:
              a. Run `npm run verify -- --slug ${{ inputs.slug }}` (the rolled-up gate: research +
                 recency + rubric scorecard) and `npm run build` (schema).
              b. For each BLOCKING (⚠) verify finding and every schema error, FIX IT by
                 re-researching that fact against a primary (T0) source — resolve the place_id
                 with lookup-place.mjs, add the missing source_url, fill the empty section,
                 correct the itinerary date. Never silence a flag you cannot source: downgrade
                 it to ⚠ or omit it. Do not explain-and-move-on.
              c. Re-run verify + build. Repeat until verify PASSes and build is clean —
                 up to 4 rounds. If something genuinely cannot be sourced after that, leave it
                 as a deliberately-explained ⚠ gap (an admitted blank is a feature).

            Then open the PR:

            1. Create a branch named `research/${{ inputs.slug }}` if it does not already exist,
               and commit your changes there with a clear message.
            2. Push the branch and open a **draft PR** with:
                 - Title: "Research pass: ${{ inputs.slug }}${{ inputs.section != '' && format(' ({0})', inputs.section) || '' }}"
                 - Body: your finish summary (what you researched, what you filled, what remains
                   ⚠ unconfirmed), the FINAL `npm run verify` scorecard (PASS or the remaining
                   explained gaps), the verification ledger table, the `## Research reconciliation`
                   summary (what each pass found + how conflicts resolved), and — if you deferred
                   any Pass B work under the wall-clock note — exactly which items still need it.
            3. NEVER remove `draft: true` from the guide JSON — graduating a guide is a human decision.
            4. Never touch any guide other than src/content/guides/${{ inputs.slug }}.json.
