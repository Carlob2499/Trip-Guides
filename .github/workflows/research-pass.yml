name: Research pass

# Assisted research pass: a Claude Code agent researches one guide via the TWO-PASS procedure
# (Pass A canonical/verified → Pass B local/authentic/crowd-aware → reconcile), runs the
# self-correction loop until verify PASSes, commits to a branch, and opens a draft PR for human
# review. Never auto-merges; draft: true is always preserved. Trigger via workflow_dispatch.
#
# RESUMABLE (pipeline P2): a full dual pass is long and can be cut off by the Action wall-clock or
# your Max usage window. The agent commits + checkpoints (guides-intake/<slug>.state.json) after
# EACH stage, and this job resumes the research/<slug> branch — so a re-run picks up at the next
# un-done stage (`npm run pipeline -- --slug <slug> --status`) instead of restarting.
#
# Runs on your Claude MAX subscription (not a pay-per-use API key), so a headless run costs ~$0
# marginal against your plan. Prerequisites:
#   - CLAUDE_CODE_OAUTH_TOKEN secret set in repo Settings → Secrets → Actions.
#     Generate it once locally with `claude setup-token` (Pro/Max only) and paste the value.
#   - The guide's scaffold exists at src/content/guides/<slug>.json
#
# Usage: Actions → Research pass → Run workflow → enter slug (and optionally section)
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Guide slug (e.g. japan, sweden). Must match src/content/guides/<slug>.json"
        required: true
        type: string
      section:
        description: "Section key to focus on (e.g. food, sights). Leave blank for a full pass."
        required: false
        type: string
        default: ""
      model:
        description: "Model for the research agent. Sonnet is the default (research is Sonnet work — see references/research-efficiency.md); pick Opus only for a genuinely contested reconcile."
        required: false
        type: choice
        options:
          - claude-sonnet-5
          - claude-opus-4-8
        default: claude-sonnet-5

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name  "waypoint-research[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Circuit breaker (docs/PIPELINE.md P2 spine): a headless run that keeps getting cut off
      # before reaching `verified` should eventually stop and ask a human instead of silently
      # resuming forever. Runs BEFORE the agent so a stuck guide never spends agent tokens.
      - name: Attempt budget
        id: budget
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ inputs.slug }}
        run: |
          set -euo pipefail
          NEXT=$(node scripts/pipeline.mjs --slug "$SLUG" --status --json | jq -r '.nextStage')
          if [ "$NEXT" = "null" ]; then
            echo "[budget] $SLUG already reached verified — nothing to do."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ATTEMPTS=$(node scripts/pipeline.mjs --slug "$SLUG" --bump-attempt --json | jq -r '.attempts')
          CAP=5
          if [ "$ATTEMPTS" -gt "$CAP" ]; then
            echo "[budget] $SLUG has been attempted $ATTEMPTS times without reaching verified (cap: $CAP) — flagging instead of continuing."
            TITLE="Research stuck: $SLUG"
            STATUS_TEXT=$(node scripts/pipeline.mjs --slug "$SLUG" --status)
            BODY=$(printf 'Automated research has run **%s** times for `%s` without reaching `verified`.\n\nCurrent status:\n```\n%s\n```\n\nThis destination may be genuinely hard to source (bot-blocked, sparse coverage) or stuck on one fact. Check `guides-intake/%s.md` and the `research/%s` branch, then either finish it by hand or re-run this workflow to keep trying — the attempt count only resets if `guides-intake/%s.state.json` is edited directly (git-tracked, so that is a deliberate act, not automatic).' "$ATTEMPTS" "$SLUG" "$STATUS_TEXT" "$SLUG" "$SLUG" "$SLUG")
            EXISTING=$(gh issue list --search "\"$TITLE\" in:title" --state open --json number -q '.[0].number' 2>/dev/null || true)
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "$BODY"
            else
              gh issue create --title "$TITLE" --body "$BODY" --label "stuck"
            fi
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "[budget] $SLUG — attempt $ATTEMPTS of $CAP, proceeding."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      # Resume the research branch if a prior (cut-off) run created it, so the agent starts with the
      # committed partial progress + checkpoint state in the working tree; otherwise start it fresh.
      - name: Resume or start the research branch
        if: steps.budget.outputs.should_run == 'true'
        run: |
          BR="research/${{ inputs.slug }}"
          if git ls-remote --exit-code --heads origin "$BR" >/dev/null 2>&1; then
            git fetch origin "$BR" && git checkout "$BR"
            echo "Resumed $BR"
          else
            git checkout -b "$BR"
            echo "Started $BR"
          fi

      - name: Run research agent
        if: steps.budget.outputs.should_run == 'true'
        uses: anthropic/claude-code-action@v1
        with:
          # Auth via the Claude Max subscription (claude setup-token), not a paid API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
          # Model economy: research is Sonnet work (research-efficiency.md). The action has no
          # `model` input — the CLI flag via claude_args is the supported mechanism.
          claude_args: "--model ${{ inputs.model || 'claude-sonnet-5' }}"
          prompt: |
            Guide slug: ${{ inputs.slug }}
            Section focus: ${{ inputs.section || 'full pass — all sections' }}

            Use the waypoint-guide-author skill: read .claude/skills/waypoint-guide-author/SKILL.md
            and its references/ (verification-rules.md, research-efficiency.md, block-types.md) and
            follow them exactly — the source-tier ladder, the verification ledger, the ≈/⚠ fact
            states, the deterministic lookup scripts, the done gate, and the completion report. The
            CLAUDE.md accuracy standard (auto-loaded) is also binding.

            RESEARCH EFFICIENCY IS BINDING (references/research-efficiency.md): scripts before web;
            reuse the ledger before re-searching; go direct-to-primary and batch by VENUE (one fetch
            answers where/how/when/book); max ~2 search rounds per fact then ship/flag/omit; a first
            404 can be a live page (retry once, judge by content); bot-blocked → mark and move on;
            aggregators are leads, never citations.

            Target guide: src/content/guides/${{ inputs.slug }}.json
            ${{ inputs.section != '' && format('Scope this pass to the "{0}" section only; leave all other sections as-is.', inputs.section) || '' }}

            RESUMABLE — START BY CHECKING WHERE YOU ARE. This run may be a fresh start OR a resume of
            a prior run that was cut off. FIRST run:
              npm run pipeline -- --slug ${{ inputs.slug }} --status
            It prints which stages (scaffold → passA → passB → reconcile → verified) are already
            cleared and the exact NEXT action. Do ONLY the un-done stages, in order. Never redo a
            cleared stage — the committed work + checkpoint is the resume point.

            RESEARCH IS TWO PASSES, THEN RECONCILE — the core of the skill's Research workflow; do
            NOT collapse it into a single pass. After you FINISH each stage below, checkpoint it and
            commit, so a cut-off run resumes here instead of restarting:
              PASS A — canonical & verified: primary/official sources. Verify the ANCHOR event's
                date + venue against a T0 source FIRST, then the must-dos, entry/visa, transit,
                hours, prices. Keep the verification ledger as you go.
                → then: npm run pipeline -- --slug ${{ inputs.slug }} --checkpoint passA
                  && git add -A && git commit -m "research(${{ inputs.slug }}): Pass A" && git push
              PASS B — local, authentic, crowd-aware: research INDEPENDENTLY from the intake (do
                not just re-read Pass A). Resident / blog / forum / reddit angle — off-peak timing
                + crowd reality for every marquee sight, novel local alternatives where the obvious
                pick is a tourist trap, the non-obvious neighborhood. Pass B's finds are T2 LEADS:
                verify each against a primary source before it enters the guide.
                → then: npm run pipeline -- --slug ${{ inputs.slug }} --checkpoint passB
                  && git add -A && git commit -m "research(${{ inputs.slug }}): Pass B" && git push
              RECONCILE into ONE guide and record it in the `## Research reconciliation` ledger of
                guides-intake/${{ inputs.slug }}.md — AGREE → include; A-only → add a crowd +
                best-time note, or swap to B's authentic version if A is a trap; B-only → verify T0
                then include; CONFLICT → resolve to the truth, note which source won. Log any
                research-forced re-plan in that doc's `## Amendments` section. Every marquee
                sight/food rec carries a crowd + best-time note, woven into the existing
                sights/days bodies (no new sections, no tab-budget cost).
                → then: npm run pipeline -- --slug ${{ inputs.slug }} --checkpoint reconcile
                  && git add -A && git commit -m "research(${{ inputs.slug }}): reconcile" && git push

            NOTE — a full dual pass is long. Committing after each stage IS the safety net: if you
            run low on wall-clock or usage, stop at a clean checkpoint (commit + push) rather than
            leaving a half-done uncommitted stage — a re-run resumes from the last checkpoint.

            SELF-CORRECTION LOOP (the `verified` stage) — do not one-shot this:
              a. Run `npm run verify -- --slug ${{ inputs.slug }}` (the rolled-up gate: research +
                 recency + rubric scorecard) and `npm run build` (schema).
              b. For each BLOCKING (⚠) verify finding and every schema error, FIX IT by
                 re-researching that fact against a primary (T0) source — resolve the place_id
                 with lookup-place.mjs, add the missing source_url, fill the empty section,
                 correct the itinerary date. Never silence a flag you cannot source: downgrade
                 it to ⚠ or omit it. Do not explain-and-move-on.
              c. Re-run verify + build. Repeat until verify PASSes and build is clean — up to 4
                 rounds. If something genuinely cannot be sourced after that, leave it as a
                 deliberately-explained ⚠ gap (an admitted blank is a feature).
              d. Once verify PASSes, generate the guide's identity palette from its new cover/
                 sight photos: `npm run extract-palette -- --slug ${{ inputs.slug }}` (writes
                 src/data/palettes/${{ inputs.slug }}.json — commit it; skips harmlessly if no
                 photo). Then:
                 npm run pipeline -- --slug ${{ inputs.slug }} --checkpoint verified
                 && git add -A && git commit -m "research(${{ inputs.slug }}): verify PASS" && git push

            If you hit the 4-round cap still NEEDS WORK (verify never PASSed), commit and push
            whatever fix attempts you made anyway, so the branch on the remote reflects your
            actual last state, not just the last checkpoint:
              git add -A && git commit -m "research(${{ inputs.slug }}): NEEDS WORK after 4 rounds" && git push
            (skip this if there's nothing to commit — `git status --short` first).

            LANDING THE BRANCH — this replaces "open a draft PR and wait for review". However the
            self-correction loop above ended, write your finish summary (what you researched, what
            you filled, what remains ⚠ unconfirmed, the verification ledger, the `## Research
            reconciliation` summary, and — if you stopped early — exactly which stages remain) into
            the scorecard file, then hand landing to the shared script rather than deciding by hand:

              npm run verify -- --slug ${{ inputs.slug }} --markdown > /tmp/scorecard.md
              # your finish summary goes ABOVE the scorecard in the same file, not a separate one
              NEXT=$(node scripts/pipeline.mjs --slug ${{ inputs.slug }} --status --json | jq -r '.nextStage')
              PASSED=false; [ "$NEXT" = "null" ] && PASSED=true   # true only if step (d) above actually checkpointed `verified`
              bash scripts/land-branch.sh "research/${{ inputs.slug }}" main \
                "Research pass: ${{ inputs.slug }}${{ inputs.section != '' && format(' ({0})', inputs.section) || '' }}" \
                /tmp/scorecard.md "$PASSED"

            It prints exactly one line — read it, don't guess what happened:

            - **`merged:<n>`** — the guide landed on `main`. `draft: true` is still set (landing
              only merges the branch; it never graduates the guide). File the graduation
              nomination yourself, so the human's only remaining action is one label click, not a
              search for what to do next:
                gh issue create --title "Graduate: ${{ inputs.slug }}" --label graduate-request \
                  --body "$(printf '### Guide slug\n\n%s\n\n### Why is this ready?\n\n%s' '${{ inputs.slug }}' "$(cat /tmp/scorecard.md)")"
              The field labels must match exactly — `graduate-guide.mjs` parses `### Guide slug`
              and `### Why is this ready?` verbatim; anything else and the nomination silently
              fails to parse.
            - **`draft:<n>`** — either verify didn't reach PASS, or the auto-merge hit a conflict.
              PR #<n> is where a human triages it. Do NOT file a graduation nomination in this case
              — there is nothing ready to graduate yet.

            NEVER remove `draft: true` from the guide JSON yourself, in either case — the
            nomination above plus the owner's `graduate-approved` label is the only path that
            flips it, and that stays a human decision. Never touch any guide other than
            src/content/guides/${{ inputs.slug }}.json (or its split-directory equivalent) and its
            guides-intake/${{ inputs.slug }}.md + .state.json.
