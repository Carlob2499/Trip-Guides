name: Research pass

# Autonomous research pass: a Claude Code agent researches one guide via the TWO-PASS procedure
# (Pass A canonical/verified → Pass B local/authentic/crowd-aware → reconcile), runs the
# self-correction loop until verify PASSes, AUTO-GRADUATES it (removes draft:true — the verify
# PASS just confirmed IS the evidence gate; see scripts/graduate-guide.mjs --slug), commits to a
# branch, and merges it straight to main. It goes live on the very next Pages deploy with ZERO
# further action — an end-user who filed the New Guide issue never has to come back and approve
# anything. Only a guide that DIDN'T reach verify PASS lands as a draft PR for human triage — that
# is the one remaining human touchpoint, and it exists only because the guide genuinely isn't
# ready, not because a routine pass needs rubber-stamping. Trigger via workflow_dispatch.
#
# RESUMABLE (pipeline P2): a full dual pass is long and can be cut off by the Action wall-clock or
# your Max usage window. The agent commits + checkpoints (guides-intake/<slug>.state.json) after
# EACH stage, and this job resumes the research/<slug> branch — so a re-run picks up at the next
# un-done stage (`npm run pipeline -- --slug <slug> --status`) instead of restarting.
#
# Runs on your Claude MAX subscription (not a pay-per-use API key), so a headless run costs ~$0
# marginal against your plan. Prerequisites:
#   - CLAUDE_CODE_OAUTH_TOKEN secret set in repo Settings → Secrets → Actions.
#     Generate it once locally with `claude setup-token` (Pro/Max only) and paste the value.
#   - The guide's scaffold exists at src/content/guides/<slug>.json
#
# Usage: Actions → Research pass → Run workflow → enter slug (and optionally section)
on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Guide slug (e.g. japan, sweden). Must match src/content/guides/<slug>.json"
        required: true
        type: string
      section:
        description: "Section key to focus on (e.g. food, sights). Leave blank for a full pass."
        required: false
        type: string
        default: ""
      model:
        description: "Model for the research agent. Sonnet is the default (research is Sonnet work — see references/research-efficiency.md); pick Opus only for a genuinely contested reconcile."
        required: false
        type: choice
        options:
          - claude-sonnet-5
          - claude-opus-4-8
        default: claude-sonnet-5

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  research:
    runs-on: ubuntu-latest
    # A4: job-level so it's in scope for every step INCLUDING the agent action below (whose
    # own bash tool calls inherit the job's environment) — was hardcoded identically here,
    # in graduate-guide.yml, new-guide.yml, astro.config.mjs, and verify-live.mjs.
    env:
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://carlob2499.github.io/Trip-Guides' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name  "waypoint-research[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # S3: inputs.slug becomes a branch name, a path segment, and a bash/agent-prompt
      # string in every step below — validate it here, first, via env: (never
      # interpolated straight into a shell string) so an invalid slug never reaches any
      # of those sinks.
      - name: Validate slug input
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          node --input-type=module -e "
            import { isValidSlug } from './scripts/lib/slug.mjs';
            if (!isValidSlug(process.env.SLUG)) { console.error('Invalid slug:', process.env.SLUG); process.exit(1); }
          "

      # Resume the research branch if a prior (cut-off) run created it, so the agent starts with the
      # committed partial progress + checkpoint state in the working tree; otherwise start it fresh.
      # P1: this MUST happen before any state-file mutation below — bumping the attempt count on
      # `main` first, then checking out this branch, made `git checkout` abort on the modified
      # state file (every resumed run went red before the agent even started).
      - name: Resume or start the research branch
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          BR="research/${SLUG}"
          if git ls-remote --exit-code --heads origin "$BR" >/dev/null 2>&1; then
            git fetch origin "$BR" && git checkout "$BR"
            echo "Resumed $BR"
          else
            git checkout -b "$BR"
            echo "Started $BR"
          fi

      # Circuit breaker (docs/PIPELINE.md P2 spine): a headless run that keeps getting cut off
      # before reaching `verified` should eventually stop and ask a human instead of silently
      # resuming forever. Runs BEFORE the agent so a stuck guide never spends agent tokens.
      # P2: attempts are read/bumped and COMMITTED on THIS branch (research/<slug>), not on
      # main — previously the bump only ever landed on main via a later merge that a failing
      # guide never reaches, so main's copy of the state file stayed at attempts: 0 forever and
      # the circuit breaker could never trip. Committing here, on the branch, right after the
      # bump, is what makes the cap real.
      - name: Attempt budget
        id: budget
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ inputs.slug }}
        run: |
          set -euo pipefail
          NEXT=$(node scripts/pipeline.mjs --slug "$SLUG" --status --json | jq -r '.nextStage')
          if [ "$NEXT" = "null" ]; then
            echo "[budget] $SLUG already reached verified — nothing to do."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ATTEMPTS=$(node scripts/pipeline.mjs --slug "$SLUG" --bump-attempt --json | jq -r '.attempts')

          # Persist the bumped attempt count on THIS branch now, so it survives even if this run
          # is cut off before the agent commits anything else — the circuit breaker's memory
          # must not depend on the agent ever reaching a commit step.
          if ! git diff --quiet -- "guides-intake/${SLUG}.state.json"; then
            git add "guides-intake/${SLUG}.state.json"
            git commit -m "chore(pipeline): attempt ${ATTEMPTS}"
            git push origin "HEAD:research/${SLUG}"
          fi

          CAP=5
          if [ "$ATTEMPTS" -gt "$CAP" ]; then
            echo "[budget] $SLUG has been attempted $ATTEMPTS times without reaching verified (cap: $CAP) — flagging instead of continuing."
            TITLE="Research stuck: $SLUG"
            STATUS_TEXT=$(node scripts/pipeline.mjs --slug "$SLUG" --status)
            BODY=$(printf 'Automated research has run **%s** times for `%s` without reaching `verified`.\n\nCurrent status:\n```\n%s\n```\n\nThis destination may be genuinely hard to source (bot-blocked, sparse coverage) or stuck on one fact. Check `guides-intake/%s.md` and the `research/%s` branch, then either finish it by hand or re-run this workflow to keep trying — the attempt count only resets if `guides-intake/%s.state.json` is edited directly (git-tracked, so that is a deliberate act, not automatic).' "$ATTEMPTS" "$SLUG" "$STATUS_TEXT" "$SLUG" "$SLUG" "$SLUG")
            EXISTING=$(gh issue list --search "\"$TITLE\" in:title" --state open --json number -q '.[0].number' 2>/dev/null || true)
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "$BODY"
            else
              gh issue create --title "$TITLE" --body "$BODY" --label "stuck"
            fi
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "[budget] $SLUG — attempt $ATTEMPTS of $CAP, proceeding."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Run research agent
        if: steps.budget.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          # Auth via the Claude Max subscription (claude setup-token), not a paid API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # v1.0 action: `allowed_tools`/`model` are deprecated top-level inputs — both now go
          # through claude_args (--allowedTools / --model). Model economy: research is Sonnet
          # work (research-efficiency.md).
          claude_args: |
            --model ${{ inputs.model || 'claude-sonnet-5' }}
            --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch
          prompt: |
            Guide slug: ${{ inputs.slug }}
            Section focus: ${{ inputs.section || 'full pass — all sections' }}

            Use the waypoint-guide-author skill: read .claude/skills/waypoint-guide-author/SKILL.md
            and its references/ (verification-rules.md, research-efficiency.md, block-types.md) and
            follow them exactly — the source-tier ladder, the verification ledger, the ≈/⚠ fact
            states, the deterministic lookup scripts, the done gate, and the completion report. The
            CLAUDE.md accuracy standard (auto-loaded) is also binding.

            RESEARCH EFFICIENCY IS BINDING (references/research-efficiency.md): scripts before web;
            reuse the ledger before re-searching; go direct-to-primary and batch by VENUE (one fetch
            answers where/how/when/book); max ~2 search rounds per fact then ship/flag/omit; a first
            404 can be a live page (retry once, judge by content); bot-blocked → mark and move on;
            aggregators are leads, never citations.

            Target guide: src/content/guides/${{ inputs.slug }}.json
            ${{ inputs.section != '' && format('Scope this pass to the "{0}" section only; leave all other sections as-is.', inputs.section) || '' }}

            RESUMABLE — START BY CHECKING WHERE YOU ARE. This run may be a fresh start OR a resume of
            a prior run that was cut off. FIRST run:
              npm run pipeline -- --slug ${{ inputs.slug }} --status
            It prints which stages (scaffold → passA → passB → reconcile → verified) are already
            cleared and the exact NEXT action. Do ONLY the un-done stages, in order. Never redo a
            cleared stage — the committed work + checkpoint is the resume point.

            RESEARCH IS TWO PASSES, THEN RECONCILE — the core of the skill's Research workflow; do
            NOT collapse it into a single pass. After you FINISH each stage below, checkpoint it and
            commit, so a cut-off run resumes here instead of restarting:
              PASS A — canonical & verified: primary/official sources. Verify the ANCHOR event's
                date + venue against a T0 source FIRST, then the must-dos, entry/visa, transit,
                hours, prices. Keep the verification ledger as you go. As soon as the guide's real
                destination coordinates are set (map center / lookup-place.mjs), resolve its time
                zone in the SAME step — `node scripts/lookup-tz.mjs <lat> <lng>` (offline, no
                search) — and set the result explicitly in the guide's `tz` field. Do this for
                every guide, not just ones that look unusual: a country's "typical" zone is a
                fallback default, not a researched fact, and it has already shipped wrong (by
                hours) for real trips before this script existed.
                → then: npm run pipeline -- --slug ${{ inputs.slug }} --checkpoint passA
                  && git add -A && git commit -m "research(${{ inputs.slug }}): Pass A" && git push
              PASS B — local, authentic, crowd-aware: research INDEPENDENTLY from the intake (do
                not just re-read Pass A). Resident / blog / forum / reddit angle — off-peak timing
                + crowd reality for every marquee sight, novel local alternatives where the obvious
                pick is a tourist trap, the non-obvious neighborhood. Pass B's finds are T2 LEADS:
                verify each against a primary source before it enters the guide.
                → then: npm run pipeline -- --slug ${{ inputs.slug }} --checkpoint passB
                  && git add -A && git commit -m "research(${{ inputs.slug }}): Pass B" && git push
              RECONCILE into ONE guide and record it in the `## Research reconciliation` ledger of
                guides-intake/${{ inputs.slug }}.md — AGREE → include; A-only → add a crowd +
                best-time note, or swap to B's authentic version if A is a trap; B-only → verify T0
                then include; CONFLICT → resolve to the truth, note which source won. Log any
                research-forced re-plan in that doc's `## Amendments` section. Every marquee
                sight/food rec carries a crowd + best-time note, woven into the existing
                sights/days bodies (no new sections, no tab-budget cost).
                → then: npm run pipeline -- --slug ${{ inputs.slug }} --checkpoint reconcile
                  && git add -A && git commit -m "research(${{ inputs.slug }}): reconcile" && git push

            NOTE — a full dual pass is long. Committing after each stage IS the safety net: if you
            run low on wall-clock or usage, stop at a clean checkpoint (commit + push) rather than
            leaving a half-done uncommitted stage — a re-run resumes from the last checkpoint.

            SELF-CORRECTION LOOP (the `verified` stage) — do not one-shot this:
              a. Run `npm run verify -- --slug ${{ inputs.slug }}` (the rolled-up gate: research +
                 recency + rubric scorecard) and `npm run build` (schema).
              b. For each BLOCKING (⚠) verify finding and every schema error, FIX IT by
                 re-researching that fact against a primary (T0) source — resolve the place_id
                 with lookup-place.mjs, add the missing source_url, fill the empty section,
                 correct the itinerary date. Never silence a flag you cannot source: downgrade
                 it to ⚠ or omit it. Do not explain-and-move-on.
              c. Re-run verify + build. Repeat until verify PASSes and build is clean — up to 4
                 rounds. If something genuinely cannot be sourced after that, leave it as a
                 deliberately-explained ⚠ gap (an admitted blank is a feature).
              c2. FINAL NETWORK GATE — the offline rounds above never checked links or Commons
                 photos; this is the ONLY gate that does, and it must PASS before anything
                 graduates. Run `npm run verify -- --slug ${{ inputs.slug }} --network`.
                 - If it reports content FAIL, fix each finding (dead link → re-source the fact
                   from a live primary; missing photo → correct the Commons filename via
                   search-commons.mjs or omit the image) and re-run this same networked verify —
                   do not fall back to the offline round (a) command from here on.
                 - If it reports UNVERIFIABLE (a Commons API outage or every link probe failing —
                   this run's checker couldn't do its job, which is not the same as "checked,
                   found nothing wrong"), wait 60s and retry ONCE. If it's still UNVERIFIABLE, do
                   NOT graduate — commit your work as-is, write the outage into the scorecard (so
                   a human sees why this run stopped short of a verdict, not a false PASS), and let
                   landing take the NEEDS-WORK/draft-PR path below.
                 Only a full networked PASS from this step licenses step (d).
              c3. THE CRITIC — the bar test (F7·C1, docs/PLAN_TRAVELER_FEATURES.md). A prompt-only
                 lens on this SAME loop, not a new stage — nothing here touches STAGE_ORDER, the
                 schema, or a checkpoint. Before step (d) is licensed, read the WHOLE merged guide
                 (not just what this pass touched) and ask ONE question per load-bearing item — an
                 anchor rec, a marquee sight/food pick, a claim about party fit or authenticity
                 (docs/GUIDE_RUBRIC.md rows #6/#9/#12): "Would this appear in ANY generic AI guide,
                 unresearched, without knowing this traveler?" If yes: either REPLACE it with
                 something this traveler's OWN ranked priorities justify, or write an explicit
                 justification against those priorities into the finish summary — never let a
                 bland-but-not-wrong item pass unflagged. Guardrails, binding:
                   - Critic ≠ editor. Any replacement re-enters the SAME verification ledger as
                     every other fact (source_url + verified_on) and the SAME continuity sweep
                     (CLAUDE.md) for anything it ripples into. A rewrite that orphans a citation
                     or breaks continuity is a defect, full stop — it does not get graduated on
                     the strength of "at least it's not generic now".
                   - Honest-blank survives critique. Never fill a genuine gap just to feel
                     complete — an admitted blank was already a feature before this step existed.
                   - Findings are logged ALWAYS, even zero. Write a `## Critic findings` section
                     into the scorecard every run: either the specific items replaced/justified,
                     or the explicit line "none — the guide passed the bar test". Silence must
                     never be mistaken for "this step didn't run".
              d. Once step (c2)'s networked verify PASSes AND step (c3)'s findings are written,
                 generate the guide's identity palette from its new cover/
                 sight photos: `npm run extract-palette -- --slug ${{ inputs.slug }}` (writes
                 src/data/palettes/${{ inputs.slug }}.json — commit it; skips harmlessly if no
                 photo). Then AUTO-GRADUATE — the verify PASS you just confirmed IS the evidence
                 gate (the same one a human approver would have re-run by hand), so this is where
                 the guide goes live, no separate approval step:
                 node scripts/graduate-guide.mjs --slug ${{ inputs.slug }}
                 && npm run pipeline -- --slug ${{ inputs.slug }} --checkpoint verified
                 && git add -A && git commit -m "research(${{ inputs.slug }}): verify PASS — auto-graduated" && git push

            If you hit the 4-round cap still NEEDS WORK (verify never PASSed), commit and push
            whatever fix attempts you made anyway, so the branch on the remote reflects your
            actual last state, not just the last checkpoint:
              git add -A && git commit -m "research(${{ inputs.slug }}): NEEDS WORK after 4 rounds" && git push
            (skip this if there's nothing to commit — `git status --short` first).

            LANDING THE BRANCH — this replaces "open a draft PR and wait for review". However the
            self-correction loop above ended, write your finish summary (what you researched, what
            you filled, what remains ⚠ unconfirmed, the verification ledger, the `## Research
            reconciliation` summary, step (c3)'s `## Critic findings` — always present, even a
            single "none" line — and, if you stopped early, exactly which stages remain) into
            the scorecard file, then hand landing to the shared script rather than deciding by hand:

              # P3: --network is required or the dead-link/photo gate never runs at all — an
              # auto-published guide could otherwise carry dead citations and still show PASS.
              # The verify EXIT CODE is captured (not just its markdown text) because PASSED must
              # gate on both signals: `nextStage=null` alone doesn't prove this LAST networked run
              # was clean — content could be unverifiable/failing on this specific invocation.
              set +e
              npm run verify -- --slug ${{ inputs.slug }} --markdown --network > /tmp/scorecard.md
              VERIFY_EXIT=$?
              set -e
              # your finish summary goes ABOVE the scorecard in the same file, not a separate one
              NEXT=$(node scripts/pipeline.mjs --slug ${{ inputs.slug }} --status --json | jq -r '.nextStage')
              PASSED=false; [ "$NEXT" = "null" ] && [ "$VERIFY_EXIT" -eq 0 ] && PASSED=true   # true only if step (d) graduated AND this networked verify run itself PASSed
              bash scripts/land-branch.sh "research/${{ inputs.slug }}" main \
                "Research pass: ${{ inputs.slug }}${{ inputs.section != '' && format(' ({0})', inputs.section) || '' }}" \
                /tmp/scorecard.md "$PASSED" \
                "$SITE_BASE_URL/guides/${{ inputs.slug }}/"

            It prints exactly one line — read it, don't guess what happened:

            - **`merged:<n>`** — the guide landed on `main` ALREADY graduated (step (d) removed
              `draft: true` before you ever reached here). It goes live on the very next Pages
              deploy — nothing further for you to do. land-branch.sh auto-files a "🚀 Auto-published"
              heads-up issue (the probation notice: a human can eyeball it and veto/roll back, since
              nobody approved it before it went live), and the deploy workflow's `verify-live` job
              then confirms it's actually reachable and linked on the live site. Both are automatic.
            - **`draft:<n>`** — one of two things happened, and the guide content itself tells you
              which: if `draft: true` is STILL present in the file on this branch, step (d) never
              ran — verify didn't reach PASS, and a human needs to fix the guide, not just approve
              it. If `draft` is already gone but you're still seeing `draft:<n>`, verify passed
              fine and step (d) already graduated it — the auto-merge simply hit a conflict, so a
              human only needs to resolve that conflict and merge; nothing to re-research.
              Either way, PR #<n> is where a human triages it — do not try to force a merge
              yourself.

            Never touch any guide other than
            src/content/guides/${{ inputs.slug }}.json (or its split-directory equivalent) and its
            guides-intake/${{ inputs.slug }}.md + .state.json + src/data/palettes/${{ inputs.slug }}.json.
