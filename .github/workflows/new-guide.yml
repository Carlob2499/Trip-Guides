name: New guide scaffold

# Fires when the "new-guide" label lands on an issue. The New-guide issue form
# (.github/ISSUE_TEMPLATE/new-guide.yml) auto-applies that label, so submitting the
# form is enough. The "new-guide" label is created automatically by
# .github/workflows/ensure-labels.yml — no manual setup needed.
#
# Commits the scaffold straight to main (no branch/PR) — main has no protection
# rules requiring review, and the draft:true + noindex-in-prod quarantine (see
# content.config.ts / GuideLayout.astro) already keep unverified guides fenced off
# from the curated grid, so a branch+PR review gate here was pure ceremony.
on:
  issues:
    types: [labeled]

# Least privilege: commit to main, comment/close the issue. No pull-requests
# permission needed — there's no PR in this flow anymore.
permissions:
  contents: write
  issues: write

jobs:
  scaffold:
    if: github.event.label.name == 'new-guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Parse issue and generate scaffold
        id: gen
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/issue-to-scaffold.mjs

      - name: Commit scaffold straight to main, comment/close the issue
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ steps.gen.outputs.slug }}
          COUNTRY: ${{ steps.gen.outputs.country }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          git config user.name  "waypoint-scaffold[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/guides guides-intake
          git commit -m "Scaffold new guide: ${COUNTRY} (from #${ISSUE_NUM})"
          # Rebase onto whatever landed on main since checkout, in case another
          # scaffold or push happened while this job ran, then push.
          git pull --rebase origin main
          git push origin HEAD:main
          GUIDE_URL="https://carlob2499.github.io/Trip-Guides/guides/${SLUG}/"
          gh issue comment "${ISSUE_NUM}" --body "Scaffolded ✅ — committed straight to \`main\`: [\`src/content/guides/${SLUG}.json\`](https://github.com/${GITHUB_REPOSITORY}/blob/main/src/content/guides/${SLUG}.json). It's live now in the *Guides-to-be* tier: ${GUIDE_URL}. It's a **draft** (\`draft: true\`) — the research pass fills the facts from here per the intake spec: [\`guides-intake/${SLUG}.md\`](https://github.com/${GITHUB_REPOSITORY}/blob/main/guides-intake/${SLUG}.md).

          **Next — run the research pass (TWO-pass generate → reconcile, on your Claude Max):**
          • *Headless:* **Actions → Research pass → Run workflow → slug \`${SLUG}\`** (needs the \`CLAUDE_CODE_OAUTH_TOKEN\` secret). A full dual pass is long — if it nears the run limit it does Pass A + the anchor/top priorities in Pass B and notes the rest for finishing interactively.
          • *Interactive (recommended):* open a local Claude Code / Cowork session on Max and paste:
          \`\`\`
          Run the research pass on ${SLUG} with the waypoint-guide-author skill (read its SKILL.md Research workflow first). Read guides-intake/${SLUG}.md and pick the traveler PARTY from TRAVELER_PATTERNS. Research in TWO independent passes: (A) canonical/verified — verify the ANCHOR event's date + venue against a T0 source FIRST, then must-dos / entry / transit / hours / prices from primary sources; (B) local/authentic/crowd-aware — off-peak timing + crowd reality for each marquee sight, novel local alternatives where the obvious pick is a tourist trap, verifying every Pass-B lead against a primary source before it enters the guide. Reconcile A + B into ONE guide and record it in the '## Research reconciliation' ledger of guides-intake/${SLUG}.md (log any research-forced re-plan in '## Amendments'). Then loop 'npm run readiness -- --slug ${SLUG}' + 'npm run build' → fix each finding against a T0 source → re-run until PASS. Keep draft:true.
          \`\`\`"
          gh issue close "${ISSUE_NUM}"
