name: New guide scaffold

# Fires when the "new-guide" label lands on an issue. The New-guide issue form
# (.github/ISSUE_TEMPLATE/new-guide.yml) auto-applies that label, so submitting the
# form is enough. The "new-guide" label is created automatically by
# .github/workflows/ensure-labels.yml — no manual setup needed.
#
# Commits the scaffold straight to main (no branch/PR) — main has no protection
# rules requiring review, and the draft:true + noindex-in-prod quarantine (see
# content.config.ts / GuideLayout.astro) already keep unverified guides fenced off
# from the curated grid, so a branch+PR review gate here was pure ceremony.
on:
  issues:
    types: [labeled]

# Least privilege: commit to main, comment/close the issue. No pull-requests
# permission needed — there's no PR in this flow anymore.
permissions:
  contents: write
  issues: write

jobs:
  scaffold:
    if: github.event.label.name == 'new-guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Parse issue and generate scaffold
        id: gen
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/issue-to-scaffold.mjs

      - name: Commit scaffold straight to main, comment/close the issue
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ steps.gen.outputs.slug }}
          COUNTRY: ${{ steps.gen.outputs.country }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          git config user.name  "waypoint-scaffold[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/guides guides-intake
          git commit -m "Scaffold new guide: ${COUNTRY} (from #${ISSUE_NUM})"
          # Rebase onto whatever landed on main since checkout, in case another
          # scaffold or push happened while this job ran, then push.
          git pull --rebase origin main
          git push origin HEAD:main
          GUIDE_URL="https://carlob2499.github.io/Trip-Guides/guides/${SLUG}/"
          gh issue comment "${ISSUE_NUM}" --body "Scaffolded ✅ — committed straight to \`main\`: [\`src/content/guides/${SLUG}.json\`](https://github.com/${GITHUB_REPOSITORY}/blob/main/src/content/guides/${SLUG}.json). It's live now in the *Guides-to-be* tier: ${GUIDE_URL}. It's a **draft** (\`draft: true\`) — a research pass fills the facts from here per the intake spec: [\`guides-intake/${SLUG}.md\`](https://github.com/${GITHUB_REPOSITORY}/blob/main/guides-intake/${SLUG}.md)."
          gh issue close "${ISSUE_NUM}"
