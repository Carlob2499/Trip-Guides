name: New guide scaffold

# Fires when the "new-guide" label lands on an issue. The New-guide issue form
# (.github/ISSUE_TEMPLATE/new-guide.yml) auto-applies that label, so submitting the
# form is enough. The "new-guide" label is created automatically by
# .github/workflows/ensure-labels.yml — no manual setup needed.
#
# Commits the scaffold straight to main (no branch/PR) — main has no protection
# rules requiring review, and the draft:true + noindex-in-prod quarantine (see
# content.config.ts / GuideLayout.astro) already keep unverified guides fenced off
# from the curated grid, so a branch+PR review gate here was pure ceremony.
on:
  issues:
    types: [labeled]

# Least privilege: commit to main, comment/close the issue, dispatch research-pass.yml.
# No pull-requests permission needed — there's no PR in THIS flow.
permissions:
  contents: write
  issues: write
  actions: write

# A6: without this, the same "new-guide" label landing twice in quick succession (a
# double-click, a relabel-after-edit) fires two concurrent scaffold jobs for the same
# issue — both parse the same issue body and each commits its own scaffold straight to
# main, producing a duplicate "slug-2" guide. One concurrency group per issue serializes
# them; the second run queues (does not cancel — a scaffold commit is not idempotent to
# interrupt mid-commit).
concurrency:
  group: new-guide-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  scaffold:
    if: github.event.label.name == 'new-guide'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # issue-to-scaffold.mjs → scaffold-guide.mjs → intake-schema.mjs imports `zod` — every
      # other workflow in this repo installs dependencies before running a Node script; this
      # one didn't, so the very first real issue filed through it failed at import time with
      # ERR_MODULE_NOT_FOUND before ever reaching a line of this repo's own code.
      - run: npm ci

      - name: Parse issue and generate scaffold
        id: gen
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/issue-to-scaffold.mjs

      - name: Commit scaffold straight to main, comment/close the issue
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ steps.gen.outputs.slug }}
          COUNTRY: ${{ steps.gen.outputs.country }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          # A4: was hardcoded identically here, in graduate-guide.yml, research-pass.yml,
          # astro.config.mjs, and verify-live.mjs (6 copies).
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://carlob2499.github.io/Trip-Guides' }}
        run: |
          set -euo pipefail
          git config user.name  "waypoint-scaffold[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/guides guides-intake
          git commit -m "Scaffold new guide: ${COUNTRY} (from #${ISSUE_NUM})"
          # Rebase onto whatever landed on main since checkout, in case another
          # scaffold or push happened while this job ran, then push.
          git pull --rebase origin main
          git push origin HEAD:main
          GUIDE_URL="${SITE_BASE_URL}/guides/${SLUG}/"
          PROGRESS_URL="${SITE_BASE_URL}/progress/?slug=${SLUG}"
          gh issue comment "${ISSUE_NUM}" --body "Scaffolded ✅ — committed straight to \`main\`: [\`src/content/guides/${SLUG}.json\`](https://github.com/${GITHUB_REPOSITORY}/blob/main/src/content/guides/${SLUG}.json). It's a **draft** (\`draft: true\`) — reachable directly at ${GUIDE_URL} (not listed on the hub grid while it's a draft) — and the research pass fills the facts from here per the intake spec: [\`guides-intake/${SLUG}.md\`](https://github.com/${GITHUB_REPOSITORY}/blob/main/guides-intake/${SLUG}.md).

          **Watch it happen:** ${PROGRESS_URL} — a live timer + step checklist (scaffold → Pass A → Pass B → reconcile → verify → published). Nothing to do here; that page updates itself.

          **The research pass is starting automatically** (TWO-pass generate → reconcile, Sonnet by default — see \`references/research-efficiency.md\`). If it reaches a full verify PASS, it **graduates and publishes itself** — \`draft: true\` comes off in the same run, it merges to \`main\`, and it's live on the next Pages deploy. No approval step, no label, nothing further from you. If it can't reach PASS (or the run gets cut off), it leaves a draft PR for a human to fix instead, and re-running the same workflow resumes from the last checkpoint.

          *Didn't start, or want to re-run/target one section?* Actions → Research pass → Run workflow → slug \`${SLUG}\` (optionally a \`section\`). Or interactively, on **Sonnet**:
          \`\`\`
          Run the research pass on ${SLUG} with the waypoint-guide-author skill (read its SKILL.md Research workflow first). Start with 'npm run pipeline -- --slug ${SLUG} --status' to see which stages remain (it's resumable — do only the un-done ones). Read guides-intake/${SLUG}.md and pick the traveler PARTY from TRAVELER_PATTERNS. Research in TWO independent passes: (A) canonical/verified — verify the ANCHOR event's date + venue against a T0 source FIRST, then must-dos / entry / transit / hours / prices from primary sources; (B) local/authentic/crowd-aware — off-peak timing + crowd reality for each marquee sight, novel local alternatives where the obvious pick is a tourist trap, verifying every Pass-B lead against a primary source before it enters the guide. Reconcile A + B into ONE guide and record it in the '## Research reconciliation' ledger of guides-intake/${SLUG}.md (log any research-forced re-plan in '## Amendments'). Checkpoint each stage as you finish it: 'npm run pipeline -- --slug ${SLUG} --checkpoint <passA|passB|reconcile>'. Then loop 'npm run verify -- --slug ${SLUG}' (rolled-up gate: research + recency + scorecard) + 'npm run build' → fix each finding against a T0 source → re-run until PASS, then graduate it — 'node scripts/graduate-guide.mjs --slug ${SLUG}' — then '--checkpoint verified'.
          \`\`\`"
          gh issue close "${ISSUE_NUM}"

      - name: Auto-start the research pass
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ steps.gen.outputs.slug }}
        run: gh workflow run research-pass.yml -f slug="${SLUG}"
