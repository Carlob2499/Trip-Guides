name: Ensure repo labels

# Guarantees the labels the automation depends on actually exist. GitHub issue
# templates can only APPLY labels that already exist — they never create them — so
# without this the New-guide form would silently fail to trigger its workflow.
#
# Runs on setup (the first push that adds this file matches the path filter) and can
# be re-run any time from the Actions tab. Idempotent via `gh label create --force`.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/ensure-labels.yml
      - .github/ISSUE_TEMPLATE/new-guide.yml
      - .github/ISSUE_TEMPLATE/graduate-guide.yml
      - .github/ISSUE_TEMPLATE/modify-guide.yml
      - .github/workflows/content-audit.yml
      - .github/workflows/graduate-guide.yml
      - .github/workflows/research-pass.yml
      - .github/workflows/modify-guide.yml
      - .github/workflows/deploy.yml
      - .github/workflows/token-canary.yml

# Label management lives under the issues API — that's all this needs.
permissions:
  issues: write

jobs:
  ensure-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update labels
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        # --force creates the label if missing, updates colour/description if present.
        run: |
          gh label create new-guide \
            --color 0E8A16 \
            --description "Triggers the new-guide scaffold workflow" \
            --force
          gh label create content-audit \
            --color FBCA04 \
            --description "Automated weekly content-audit tracking issue" \
            --force
          gh label create graduate-request \
            --color 0E8A16 \
            --description "Nominates a draft guide as ready to leave Guides-to-be — anyone can open one" \
            --force
          gh label create graduate-approved \
            --color 5319E7 \
            --description "Owner-only: applying this label actually flips draft:false. Requires write access." \
            --force
          gh label create modify-request \
            --color 0E8A16 \
            --description "Requests a scoped content edit on a guide — anyone can open one" \
            --force
          gh label create modify-approved \
            --color 5319E7 \
            --description "Owner-only: applying this label actually runs the edit pass. Requires write access." \
            --force
          gh label create stuck \
            --color D93F0B \
            --description "An automated research pass hit its attempt cap without reaching verified" \
            --force
          gh label create deploy-verification \
            --color B60205 \
            --description "Post-deploy verify-live check found a published guide missing from the live site" \
            --force
          gh label create auto-published \
            --color 5319E7 \
            --description "A guide auto-published (verified) with no human approval — a vetoable heads-up" \
            --force
          gh label create token-canary \
            --color B60205 \
            --description "The weekly OAuth-token canary failed — the agent pipeline is down until the token is rotated" \
            --force
