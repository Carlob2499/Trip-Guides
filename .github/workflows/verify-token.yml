name: Verify token

# THROWAWAY auth check for the CLAUDE_CODE_OAUTH_TOKEN secret. Dispatch it once from the Actions
# tab (or via API); a green run means the claude-code-action authenticated with the token — i.e.
# the secret is present and valid. A red run with an auth error means the token is missing/wrong.
# Delete this file once verified — it is not part of the pipeline.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Claude (auth check only)
        uses: anthropics/claude-code-action@v1
        with:
          # Same auth path as research-pass.yml — the Claude Max subscription token.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model claude-sonnet-5
            --allowedTools Read
          prompt: |
            Reply with exactly: TOKEN_OK
            Do not use any tools. Do nothing else.
