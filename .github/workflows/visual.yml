name: Visual regression

# Screenshot-diff gate (convergence Phase 2): hub + Korea guide, light/dark ×
# mobile/desktop, diffed against committed baselines. Pull requests only — this
# workflow never runs on main and never touches the deploy pipeline.
#
# Baseline bootstrap: baselines are per-platform. `--update-snapshots missing`
# creates absent linux baselines on a first run (pass) instead of failing;
# commit the uploaded artifact's snapshots to the branch to arm real diffing.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --update-snapshots missing
      - name: Upload snapshots + diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: |
            tests/visual/*-snapshots/
            test-results/
          retention-days: 14
