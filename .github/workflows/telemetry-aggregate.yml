name: Telemetry aggregate

# Weekly roll-up of anonymous tab-open counts into docs/telemetry/ (committed), so the
# waypoint-guide-author skill starts the next guide from evidence of what travelers actually
# use (goal 6) rather than doctrine. Reads the RTDB `telemetry` node KEYLESS (it's .read: true
# — aggregate counts, no PII), so no secret is needed. Only commits when the summary changed.
on:
  schedule:
    # 04:23 UTC every Monday — off-the-hour on purpose (see content-audit.yml).
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Aggregate telemetry
        run: npm run aggregate-telemetry
      - name: Commit summary if it changed
        run: |
          if [ -n "$(git status --porcelain docs/telemetry)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/telemetry
            git commit -m "chore(telemetry): weekly usage summary"
            git push
          else
            echo "telemetry: no change"
          fi
