name: Graduate guide

# MANUAL OVERRIDE / rescue path — NOT the primary route to publish anymore. A guide that
# research-pass.yml successfully verified auto-graduates itself in that same run (see
# scripts/graduate-guide.mjs --slug, called from research-pass.yml's self-correction loop) — no
# issue, no label, no human. This workflow exists for what auto-graduation can't cover: a draft
# that a human finished or fixed by hand outside the pipeline, an old guide scaffolded before
# auto-graduation existed, or a draft PR a human triaged and wants published without re-running
# the whole research pass. Anyone can file a "Graduate a draft guide" issue (auto-applies
# graduate-request — see .github/ISSUE_TEMPLATE/graduate-guide.yml) — that alone does nothing.
# This workflow only runs when graduate-approved is ALSO applied, which requires write access to
# the repo (GitHub's own permission model, not a custom check here) — so this override path stays
# the owner's decision even though anyone can nominate.
#
# GRADUATE ON EVIDENCE (pipeline P4): approval is necessary but not sufficient. The guide is flipped
# in the working tree, then gated on `npm run build` (schema) + `npm run verify` (research/recency);
# the verify SCORECARD is posted to the issue either way. If the gate fails, the guide is NOT
# published and the issue stays open — fix the findings and re-apply the label. Only a clean gate
# commits the flip to main. This is what stops an empty/broken draft from graduating on a rubber stamp
# — the same bar research-pass.yml's own auto-graduation step holds itself to.
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  graduate:
    if: >
      github.event.label.name == 'graduate-approved' &&
      contains(github.event.issue.labels.*.name, 'graduate-request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Flip draft off in the WORKING TREE only (not committed yet) — so the evidence gate below
      # verifies the guide exactly as it will be published (draft: no → recency becomes live).
      - name: Flip draft (working tree only)
        id: grad
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/graduate-guide.mjs

      # The evidence gate: build (schema) + verify (research/recency), scorecard posted to the issue
      # regardless of outcome. A failing gate blocks graduation (exit 1 → the commit step is skipped)
      # and leaves the issue open.
      - name: Evidence gate — build + verify + post scorecard
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ steps.grad.outputs.slug }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          set +e
          npm run build > build.log 2>&1; BUILD=$?
          # P3: --network is required or the dead-link/photo gate in verify-guide.mjs never runs
          # at all — the publish path was previously green even with dead citations.
          npm run verify --silent -- --slug "$SLUG" --markdown --network > scorecard.md; VERIFY=$?
          {
            echo "### Graduation evidence — \`$SLUG\`"
            echo
            cat scorecard.md
            echo
            if [ "$BUILD" -ne 0 ]; then
              echo "> ❌ \`npm run build\` (schema) FAILED — this guide can't publish. Last lines:"
              echo '```'
              tail -n 20 build.log
              echo '```'
            else
              echo "> ✅ \`npm run build\` (schema) clean."
            fi
          } > comment.md
          gh issue comment "$ISSUE_NUM" --body-file comment.md
          if [ "$VERIFY" -ne 0 ] || [ "$BUILD" -ne 0 ]; then
            gh issue comment "$ISSUE_NUM" --body "❌ **Graduation blocked** — \`$SLUG\` does not pass the evidence gate (see the scorecard above). Fix the blocking findings, then re-apply the \`graduate-approved\` label to try again. The guide was NOT published."
            exit 1
          fi
          echo "Evidence gate passed for $SLUG."

      # Reached only when the gate passed. Commit the flip to main, record it, close the issue.
      - name: Commit straight to main, comment/close the issue
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ steps.grad.outputs.slug }}
          COUNTRY: ${{ steps.grad.outputs.country }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          # A4: was hardcoded identically here, in new-guide.yml, research-pass.yml,
          # astro.config.mjs, and verify-live.mjs (6 copies). SITE_BASE_URL lets any of
          # them swap targets without editing source; this is the shared default.
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://carlob2499.github.io/Trip-Guides' }}
        run: |
          set -euo pipefail
          git config user.name  "waypoint-scaffold[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage whichever shape scripts/graduate-guide.mjs actually wrote to — a flat
          # src/content/guides/<slug>.json, or a split guide's src/content/guides/<slug>/_guide.json.
          # E8·2: the flat-vs-directory resolution order used to be re-implemented inline here;
          # now it calls the single shared resolver (scripts/lib/guide-shape.mjs) instead.
          META_PATH=$(node -e '
            import("./scripts/lib/guide-shape.mjs").then(({ resolveGuidePath }) => {
              const r = resolveGuidePath(process.argv[1], "src/content/guides");
              if (!r) process.exit(1);
              console.log(r.metaPath);
            });
          ' "${SLUG}")
          git add "$META_PATH"
          git commit -m "Graduate guide: ${COUNTRY} (${SLUG}, from #${ISSUE_NUM})"
          git pull --rebase origin main
          git push origin HEAD:main
          GUIDE_URL="${SITE_BASE_URL}/guides/${SLUG}/"
          gh issue comment "${ISSUE_NUM}" --body "Graduated ✅ (evidence gate passed) — \`draft\` removed from \`src/content/guides/${SLUG}.json\`. It'll appear in the curated grid on the next deploy: ${GUIDE_URL}. Reminder: the \`verified\` freshness stamp wasn't touched — update it separately if it still reads as an unverified draft."
          gh issue close "${ISSUE_NUM}"
